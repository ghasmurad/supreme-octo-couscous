<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Happy Hour Arcade</title>
  <meta name="description" content="A live virtual happy hour game room for intros, Majority Rules, trivia, emoji puzzles, superlatives, and final bonus rounds." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orbs" aria-hidden="true">
    <span></span><span></span><span></span>
  </div>

  <header class="topbar">
    <button class="brand" data-action="go-home" aria-label="Happy Hour Arcade home">
      <span class="brand-mark">🎉</span>
      <span>
        <strong>Happy Hour Arcade</strong>
        <small id="connectionStatus">Local demo mode</small>
      </span>
    </button>
    <div class="topbar-actions">
      <span class="pill subtle" id="roomPill">No room</span>
      <button class="ghost small" data-action="copy-link">Copy Link</button>
      <button class="ghost small" data-action="toggle-sound">Sound: Off</button>
    </div>
  </header>

  <main id="app" class="app-shell" aria-live="polite"></main>

  <template id="modalTemplate">
    <div class="modal-backdrop" role="dialog" aria-modal="true">
      <div class="modal-card">
        <button class="modal-close" data-action="close-modal" aria-label="Close">×</button>
        <div class="modal-content"></div>
      </div>
    </div>
  </template>

  <canvas id="confettiCanvas" aria-hidden="true"></canvas>

  <script src="firebase-config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
